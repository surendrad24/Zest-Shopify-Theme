name: Deploy Shopify Theme

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_live:
        description: "Deploy to live theme (requires environment approval)"
        required: true
        default: false
        type: boolean

jobs:
  deploy_staging:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Shopify CLI
        run: npm install -g @shopify/cli @shopify/theme

      - name: Deploy to Shopify staging theme
        env:
          SHOPIFY_FLAG_STORE: ${{ secrets.SHOPIFY_FLAG_STORE }}
          SHOPIFY_CLI_THEME_TOKEN: ${{ secrets.SHOPIFY_CLI_THEME_TOKEN }}
        run: |
          shopify theme push \
            --store "$SHOPIFY_FLAG_STORE" \
            --theme "${{ secrets.SHOPIFY_FLAG_STAGING_THEME_ID }}" \
            --nodelete \
            --path .

  deploy_live:
    if: github.event_name == 'workflow_dispatch' && inputs.deploy_live
    runs-on: ubuntu-latest
    environment:
      name: shopify-live
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Shopify CLI
        run: npm install -g @shopify/cli @shopify/theme

      - name: Deploy to Shopify live theme
        env:
          SHOPIFY_FLAG_STORE: ${{ secrets.SHOPIFY_FLAG_STORE }}
          SHOPIFY_CLI_THEME_TOKEN: ${{ secrets.SHOPIFY_CLI_THEME_TOKEN }}
        run: |
          shopify theme push \
            --store "$SHOPIFY_FLAG_STORE" \
            --theme "${{ secrets.SHOPIFY_FLAG_THEME_ID }}" \
            --allow-live \
            --nodelete \
            --path .
